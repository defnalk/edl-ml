line-length = 100
target-version = "py310"
src = ["src", "tests"]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "UP",   # pyupgrade
  "N",    # pep8-naming
  "SIM",  # flake8-simplify
  "ARG",  # flake8-unused-arguments
  "PL",   # pylint
  "RUF",  # ruff-specific
]
ignore = [
  "E501",   # long lines (handled by formatter)
  "PLR0913",# too many arguments
  "PLR0912",# too many branches
  "PLR0915",# too many statements
  "PLR2004",# magic numbers in tests / physics
  "PLC0415",# deferred imports (used for optional ML deps)
  "PLW2901",# loop variable overwrite (idiomatic here)
  "N803",   # arg names (allow PascalCase for conventional symbols)
  "N806",   # local vars (same)
  "RUF002", # µ and greek in docstrings/comments
  "RUF005", # list concatenation style
  "RUF046", # int() on numeric calls
  "RUF003", # ambiguous characters in comments
  "RUF001", # ambiguous characters
  "ARG001", # unused function args (signatures required by scipy.solve_ivp)
]

[lint.per-file-ignores]
"tests/*" = ["ARG001", "PLR2004", "B011"]
"notebooks/*" = ["ALL"]

[lint.pydocstyle]
convention = "numpy"

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
